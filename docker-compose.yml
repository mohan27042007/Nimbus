version: '3.9'

networks:
  nimbus-network:
    driver: bridge

services:

  ml-service:
    build:
      context: .
      dockerfile: Dockerfile.ml
    container_name: nimbus-ml-service
    ports:
      - "8001:8001"
    networks:
      - nimbus-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", 
             "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: nimbus-gateway
    ports:
      - "8000:8000"
    networks:
      - nimbus-network
    environment:
      - ML_SERVICE_URL=http://ml-service:8001
    depends_on:
      ml-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_PUBLISHABLE_KEY=${VITE_SUPABASE_PUBLISHABLE_KEY}
        - VITE_ML_API_BASE_URL=http://localhost:8000
    container_name: nimbus-frontend
    ports:
      - "8080:80"
    networks:
      - nimbus-network
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped
